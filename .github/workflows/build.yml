name: Update & Build Pacman Repo

on:
  schedule:
    - cron: '0 */6 * * *'   # cek setiap 6 jam
  workflow_dispatch:          # bisa trigger manual juga
    inputs:
      force_rebuild:
        description: 'Force rebuild even if version is the same'
        type: boolean
        default: false

permissions:
  contents: write   # butuh untuk push ke releases

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --privileged   # butuh untuk makepkg fakeroot

    outputs:
      new_version: ${{ steps.check.outputs.new_version }}
      should_build: ${{ steps.check.outputs.should_build }}

    steps:
      # ── Setup Arch environment ──────────────────────────────────────────────
      - name: Setup Arch dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm \
            git base-devel curl jq wget \
            pacman-contrib sudo

      - name: Create build user (makepkg cannot run as root)
        run: |
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
          # beri akses ke workspace
          chown -R builder:builder /home/runner 2>/dev/null || true

      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fix workspace permissions
        run: chown -R builder:builder $GITHUB_WORKSPACE

      # ── Version check ───────────────────────────────────────────────────────
      - name: Check latest upstream version
        id: check
        run: |
          # Ambil latest tag dari upstream
          UPSTREAM_TAG=$(curl -sL \
            "https://api.github.com/repos/Diegiwg/PrismLauncher-Cracked/releases/latest" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            | jq -r '.tag_name')

          # Strip leading 'v' kalau ada (misal v9.1 → 9.1)
          UPSTREAM_VER="${UPSTREAM_TAG#v}"
          echo "Upstream version: $UPSTREAM_VER"

          # Baca pkgver saat ini dari PKGBUILD
          CURRENT_VER=$(grep -Po '(?<=^pkgver=)[^\s]+' PKGBUILD)
          echo "Current pkgver:   $CURRENT_VER"

          echo "new_version=$UPSTREAM_VER" >> "$GITHUB_OUTPUT"
          echo "upstream_tag=$UPSTREAM_TAG" >> "$GITHUB_OUTPUT"

          if [[ "$UPSTREAM_VER" != "$CURRENT_VER" || "${{ inputs.force_rebuild }}" == "true" ]]; then
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            echo "✅ New version detected or force rebuild — will build $UPSTREAM_VER"
          else
            echo "should_build=false" >> "$GITHUB_OUTPUT"
            echo "⏭️  Already up-to-date ($CURRENT_VER), skipping."
          fi

      # ── Update PKGBUILD ─────────────────────────────────────────────────────
      - name: Update PKGBUILD pkgver & checksums
        if: steps.check.outputs.should_build == 'true'
        run: |
          NEW_VER="${{ steps.check.outputs.new_version }}"

          # Update pkgver
          sed -i "s/^pkgver=.*/pkgver=$NEW_VER/" PKGBUILD

          # Reset pkgrel ke 1 saat versi upstream berubah
          sed -i "s/^pkgrel=.*/pkgrel=1/" PKGBUILD

          echo "Updated PKGBUILD:"
          grep -E '^(pkgver|pkgrel)=' PKGBUILD

      - name: Update checksums (updpkgsums)
        if: steps.check.outputs.should_build == 'true'
        run: su builder -c "cd $GITHUB_WORKSPACE && updpkgsums"

      # ── Build package ───────────────────────────────────────────────────────
      - name: Build package with makepkg
        if: steps.check.outputs.should_build == 'true'
        run: |
          su builder -c "cd $GITHUB_WORKSPACE && makepkg -s --noconfirm --noprogressbar"

      - name: List built packages
        if: steps.check.outputs.should_build == 'true'
        run: ls -lh $GITHUB_WORKSPACE/*.pkg.tar.zst

      # ── Build pacman repo DB ────────────────────────────────────────────────
      - name: Create pacman repo database
        if: steps.check.outputs.should_build == 'true'
        run: |
          mkdir -p $GITHUB_WORKSPACE/repo

          # Copy packages ke folder repo
          cp $GITHUB_WORKSPACE/*.pkg.tar.zst $GITHUB_WORKSPACE/repo/

          # Buat .db dan .files
          cd $GITHUB_WORKSPACE/repo
          repo-add prism-cracked.db.tar.gz *.pkg.tar.zst

          echo "Repo contents:"
          ls -lh

      # ── Commit updated PKGBUILD ─────────────────────────────────────────────
      - name: Commit PKGBUILD changes
        if: steps.check.outputs.should_build == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add PKGBUILD
          git diff --staged --quiet || \
            git commit -m "chore: bump pkgver to ${{ steps.check.outputs.new_version }}"
          git push

      # ── Upload ke GitHub Release ────────────────────────────────────────────
      - name: Create or update GitHub Release
        if: steps.check.outputs.should_build == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.check.outputs.new_version }}
          name: PrismLauncher Cracked ${{ steps.check.outputs.new_version }}
          body: |
            ## PrismLauncher Cracked `${{ steps.check.outputs.new_version }}`

            Built from upstream: [Diegiwg/PrismLauncher-Cracked@${{ steps.check.outputs.new_version }}](https://github.com/Diegiwg/PrismLauncher-Cracked/releases/tag/v${{ steps.check.outputs.new_version }})

            ### Cara pakai (tambahkan repo ke `/etc/pacman.conf`):
            ```ini
            [prism-cracked]
            SigLevel = Optional TrustAll
            Server = https://github.com/${{ github.repository }}/releases/download/v${{ steps.check.outputs.new_version }}
            ```

            Lalu:
            ```bash
            sudo pacman -Sy prismlauncher-cracked-bin
            ```
          files: |
            repo/*.pkg.tar.zst
            repo/prism-cracked.db.tar.gz
            repo/prism-cracked.db.tar.gz.old
            repo/prism-cracked.files.tar.gz
          make_latest: true
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}