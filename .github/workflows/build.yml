name: Update & Build Pacman Repo

on:
  push:
    branches:
      - '**'
  schedule:
    - cron: '0 */6 * * *'   # cek setiap 6 jam
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: 'Force rebuild even if version is the same'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --privileged

    outputs:
      new_version:     ${{ steps.check.outputs.new_version }}
      upstream_tag:    ${{ steps.check.outputs.upstream_tag }}
      should_build:    ${{ steps.check.outputs.should_build }}
      version_changed: ${{ steps.check.outputs.version_changed }}

    steps:
      # ── Setup Arch environment ───────────────────────────────────────────────
      - name: Setup Arch dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm \
            git base-devel curl jq wget \
            pacman-contrib sudo python3

      - name: Create build user (makepkg cannot run as root)
        run: |
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers

      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fix workspace permissions
        run: |
          chown -R builder:builder $GITHUB_WORKSPACE
          git config --global --add safe.directory '*'
          su builder -c "git config --global --add safe.directory '*'"

      # ── Version check ────────────────────────────────────────────────────────
      - name: Check latest upstream version
        id: check
        run: |
          UPSTREAM_TAG=$(curl -sL \
            "https://api.github.com/repos/Diegiwg/PrismLauncher-Cracked/releases/latest" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            | jq -r '.tag_name')

          echo "Raw upstream tag: $UPSTREAM_TAG"

          STRIPPED="${UPSTREAM_TAG#v}"
          UPSTREAM_VER=$(echo "$STRIPPED" | tr '-' '.' | tr -cd '[:alnum:]._+')
          echo "Sanitized pkgver: $UPSTREAM_VER"

          CURRENT_VER=$(grep -Po '(?<=^pkgver=)[^\s]+' PKGBUILD)
          echo "Current pkgver:   $CURRENT_VER"

          echo "new_version=$UPSTREAM_VER"  >> "$GITHUB_OUTPUT"
          echo "upstream_tag=$UPSTREAM_TAG" >> "$GITHUB_OUTPUT"

          VERSION_CHANGED="false"
          SHOULD_BUILD="false"

          if [[ "$UPSTREAM_VER" != "$CURRENT_VER" ]]; then
            VERSION_CHANGED="true"
            SHOULD_BUILD="true"
            echo "✅ New version detected — will build $UPSTREAM_VER (was $CURRENT_VER)"
          elif [[ "${{ inputs.force_rebuild }}" == "true" ]]; then
            SHOULD_BUILD="true"
            echo "🔁 Force rebuild at current version $CURRENT_VER"
          else
            echo "⏭️  Already up-to-date ($CURRENT_VER), skipping."
          fi

          echo "version_changed=$VERSION_CHANGED" >> "$GITHUB_OUTPUT"
          echo "should_build=$SHOULD_BUILD"       >> "$GITHUB_OUTPUT"

      # ── Update PKGBUILD ──────────────────────────────────────────────────────
      # Hanya jalankan saat versi benar-benar berubah (bukan force_rebuild)
      - name: Update PKGBUILD pkgver & _pkgtag
        if: steps.check.outputs.version_changed == 'true'
        run: |
          NEW_VER="${{ steps.check.outputs.new_version }}"
          RAW_TAG="${{ steps.check.outputs.upstream_tag }}"

          sed -i "s/^pkgver=.*/pkgver=$NEW_VER/" PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=1/"        PKGBUILD

          if grep -q '^_pkgtag=' PKGBUILD; then
            sed -i "s|^_pkgtag=.*|_pkgtag=$RAW_TAG|" PKGBUILD
          else
            sed -i "/^pkgrel=/a _pkgtag=$RAW_TAG" PKGBUILD
          fi

          echo "Updated PKGBUILD:"
          grep -E '^(pkgver|pkgrel|_pkgtag)=' PKGBUILD

      # ── Download AppImage & hitung ulang checksum ────────────────────────────
      # Dilakukan manual supaya makepkg tidak perlu download ulang saat build,
      # sekaligus menggantikan updpkgsums yang selalu download semua sources.
      - name: Download AppImage & update sha256sums
        if: steps.check.outputs.should_build == 'true'
        run: |
          NEW_VER="${{ steps.check.outputs.new_version }}"
          RAW_TAG="${{ steps.check.outputs.upstream_tag }}"
          PKGNAME="prismlauncher-cracked-bin"
          APPIMAGE_FILE="${PKGNAME}-${NEW_VER}.AppImage"
          URL="https://github.com/Diegiwg/PrismLauncher-Cracked/releases/download/${RAW_TAG}/PrismLauncher-Linux-x86_64.AppImage"

          echo "Downloading AppImage: $URL"
          wget -q --show-progress "$URL" -O "$GITHUB_WORKSPACE/$APPIMAGE_FILE"

          APPIMAGE_SHA=$(sha256sum "$GITHUB_WORKSPACE/$APPIMAGE_FILE"                        | awk '{print $1}')
          SVG_SHA=$(sha256sum     "$GITHUB_WORKSPACE/org.prismlauncher.PrismLauncher.svg"    | awk '{print $1}')
          INSTALL_SHA=$(sha256sum "$GITHUB_WORKSPACE/prismlauncher-cracked-bin.install"      | awk '{print $1}')

          echo "Checksums:"
          echo "  AppImage : $APPIMAGE_SHA"
          echo "  SVG      : $SVG_SHA"
          echo "  Install  : $INSTALL_SHA"

          # Tulis blok sha256sums baru ke file sementara lalu replace di PKGBUILD
          echo "sha256sums=('${APPIMAGE_SHA}'" > /tmp/new_sums.txt
          echo "            '${SVG_SHA}'" >> /tmp/new_sums.txt
          echo "            '${INSTALL_SHA}')" >> /tmp/new_sums.txt

          # Replace sha256sums block in PKGBUILD using Python (single line to avoid YAML issues)
          python3 -c "import re; new_block=open('/tmp/new_sums.txt').read().strip(); content=open('PKGBUILD').read(); content=re.sub(r'sha256sums=\([^)]*\)', new_block, content, flags=re.DOTALL); open('PKGBUILD','w').write(content); print('sha256sums updated successfully')"

          # Pastikan AppImage bisa diakses oleh builder saat makepkg
          chown builder:builder "$GITHUB_WORKSPACE/$APPIMAGE_FILE"

      # ── Build package ────────────────────────────────────────────────────────
      - name: Build package with makepkg
        if: steps.check.outputs.should_build == 'true'
        run: |
          # AppImage sudah ada di workspace — makepkg tidak akan download ulang
          su builder -c "cd $GITHUB_WORKSPACE && makepkg -s --noconfirm --noprogressbar"

      - name: List built packages
        if: steps.check.outputs.should_build == 'true'
        run: ls -lh $GITHUB_WORKSPACE/*.pkg.tar.zst

      # ── Build pacman repo DB ─────────────────────────────────────────────────
      - name: Create pacman repo database
        if: steps.check.outputs.should_build == 'true'
        run: |
          mkdir -p $GITHUB_WORKSPACE/repo
          cp $GITHUB_WORKSPACE/*.pkg.tar.zst $GITHUB_WORKSPACE/repo/

          cd $GITHUB_WORKSPACE/repo
          repo-add prism-cracked.db.tar.gz *.pkg.tar.zst

          # repo-add buat hard link .db → .db.tar.gz (same inode)
          # pacman butuh file bernama .db, jadi unlink dulu lalu copy
          rm -f prism-cracked.db prism-cracked.files
          cp prism-cracked.db.tar.gz prism-cracked.db
          cp prism-cracked.files.tar.gz prism-cracked.files

          echo "Repo contents:"
          ls -lh

      # ── Commit PKGBUILD ──────────────────────────────────────────────────────
      # Hanya commit saat versi berubah supaya tidak ada noise commit
      - name: Commit PKGBUILD changes
        if: steps.check.outputs.version_changed == 'true'
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          cd "$GITHUB_WORKSPACE"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add PKGBUILD
          git diff --staged --quiet || \
            git commit -m "chore: bump pkgver to ${{ steps.check.outputs.new_version }}"
          git push

      # ── Upload ke GitHub Release ─────────────────────────────────────────────
      # Tag "repo" = fixed URL untuk pacman.conf, tidak pernah berubah.
      # make_latest: false supaya tidak menggeser versioned release sebagai "Latest".
      - name: Update fixed "repo" release
        if: steps.check.outputs.should_build == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: repo
          name: Pacman Repo (latest)
          make_latest: false
          prerelease: true
          body: |
            ## Pacman Repo — PrismLauncher Cracked

            > **Versi saat ini:** `${{ steps.check.outputs.new_version }}`
            > Built from: [Diegiwg/PrismLauncher-Cracked@${{ steps.check.outputs.upstream_tag }}](https://github.com/Diegiwg/PrismLauncher-Cracked/releases/tag/${{ steps.check.outputs.upstream_tag }})

            ### Setup (sekali saja, tidak perlu diubah lagi saat update)

            Tambahkan ke `/etc/pacman.conf`:
            ```ini
            [prism-cracked]
            SigLevel = Optional TrustAll
            Server = https://repo.oryn.my.id
            ```

            Lalu install:
            ```bash
            sudo pacman -Sy prismlauncher-cracked-bin
            ```
          files: |
            repo/*.pkg.tar.zst
            repo/prism-cracked.db.tar.gz
            repo/prism-cracked.db
            repo/prism-cracked.files.tar.gz
            repo/prism-cracked.files
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Release per-versi hanya dibuat saat versi benar-benar berubah,
      # sehingga force_rebuild tidak menyebabkan konflik tag yang sudah ada.
      - name: Create versioned release (archive)
        if: steps.check.outputs.version_changed == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.check.outputs.new_version }}
          name: PrismLauncher Cracked ${{ steps.check.outputs.new_version }}
          make_latest: true
          body: |
            Built from upstream tag `${{ steps.check.outputs.upstream_tag }}`.
            Untuk instalasi, gunakan repo di tag `repo`.
          files: |
            repo/*.pkg.tar.zst
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
