name: Update & Build Pacman Repo

on:
  schedule:
    - cron: '0 */6 * * *'   # cek setiap 6 jam
  workflow_dispatch:          # bisa trigger manual juga
    inputs:
      force_rebuild:
        description: 'Force rebuild even if version is the same'
        type: boolean
        default: false

permissions:
  contents: write   # butuh untuk push ke releases

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --privileged   # butuh untuk makepkg fakeroot

    outputs:
      new_version: ${{ steps.check.outputs.new_version }}
      should_build: ${{ steps.check.outputs.should_build }}

    steps:
      # ── Setup Arch environment ──────────────────────────────────────────────
      - name: Setup Arch dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm \
            git base-devel curl jq wget \
            pacman-contrib sudo

      - name: Create build user (makepkg cannot run as root)
        run: |
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
          # beri akses ke workspace
          chown -R builder:builder /home/runner 2>/dev/null || true

      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fix workspace permissions
        run: |
          chown -R builder:builder $GITHUB_WORKSPACE
          # Tandai semua directory sebagai safe (root & builder di container)
          git config --global --add safe.directory '*'
          su builder -c "git config --global --add safe.directory '*'"

      # ── Version check ───────────────────────────────────────────────────────
      - name: Check latest upstream version
        id: check
        run: |
          # Ambil latest tag dari upstream
          UPSTREAM_TAG=$(curl -sL \
            "https://api.github.com/repos/Diegiwg/PrismLauncher-Cracked/releases/latest" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            | jq -r '.tag_name')

          echo "Raw upstream tag: $UPSTREAM_TAG"

          # Strip leading 'v' (v9.1 → 9.1)
          STRIPPED="${UPSTREAM_TAG#v}"

          # Sanitize: pkgver tidak boleh mengandung ':', '/', '-', atau spasi
          # Ganti '-' dengan '.', hapus karakter lain yang invalid
          UPSTREAM_VER=$(echo "$STRIPPED" | tr '-' '.' | tr -cd '[:alnum:]._+')

          echo "Sanitized pkgver: $UPSTREAM_VER"

          # Baca pkgver saat ini dari PKGBUILD
          CURRENT_VER=$(grep -Po '(?<=^pkgver=)[^\s]+' PKGBUILD)
          echo "Current pkgver:   $CURRENT_VER"

          echo "new_version=$UPSTREAM_VER" >> "$GITHUB_OUTPUT"
          echo "upstream_tag=$UPSTREAM_TAG" >> "$GITHUB_OUTPUT"

          if [[ "$UPSTREAM_VER" != "$CURRENT_VER" || "${{ inputs.force_rebuild }}" == "true" ]]; then
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            echo "✅ New version detected or force rebuild — will build $UPSTREAM_VER (tag: $UPSTREAM_TAG)"
          else
            echo "should_build=false" >> "$GITHUB_OUTPUT"
            echo "⏭️  Already up-to-date ($CURRENT_VER), skipping."
          fi

      # ── Update PKGBUILD ─────────────────────────────────────────────────────
      - name: Update PKGBUILD pkgver & checksums
        if: steps.check.outputs.should_build == 'true'
        run: |
          NEW_VER="${{ steps.check.outputs.new_version }}"
          RAW_TAG="${{ steps.check.outputs.upstream_tag }}"

          # Update pkgver (versi yang sudah disanitize, tanpa karakter invalid)
          sed -i "s/^pkgver=.*/pkgver=$NEW_VER/" PKGBUILD

          # Reset pkgrel ke 1 saat versi upstream berubah
          sed -i "s/^pkgrel=.*/pkgrel=1/" PKGBUILD

          # Update _pkgtag — dipakai di source= untuk URL download yang menggunakan tag asli
          # Kalau belum ada, tambahkan setelah baris pkgrel=
          if grep -q '^_pkgtag=' PKGBUILD; then
            sed -i "s|^_pkgtag=.*|_pkgtag=$RAW_TAG|" PKGBUILD
          else
            sed -i "/^pkgrel=/a _pkgtag=$RAW_TAG" PKGBUILD
          fi

          echo "Updated PKGBUILD:"
          grep -E '^(pkgver|pkgrel|_pkgtag)=' PKGBUILD

      - name: Update checksums (updpkgsums)
        if: steps.check.outputs.should_build == 'true'
        run: su builder -c "cd $GITHUB_WORKSPACE && updpkgsums"

      # ── Build package ───────────────────────────────────────────────────────
      - name: Build package with makepkg
        if: steps.check.outputs.should_build == 'true'
        run: |
          su builder -c "cd $GITHUB_WORKSPACE && makepkg -s --noconfirm --noprogressbar"

      - name: List built packages
        if: steps.check.outputs.should_build == 'true'
        run: ls -lh $GITHUB_WORKSPACE/*.pkg.tar.zst

      # ── Build pacman repo DB ────────────────────────────────────────────────
      - name: Create pacman repo database
        if: steps.check.outputs.should_build == 'true'
        run: |
          mkdir -p $GITHUB_WORKSPACE/repo

          # Copy packages ke folder repo
          cp $GITHUB_WORKSPACE/*.pkg.tar.zst $GITHUB_WORKSPACE/repo/

          # Buat .db dan .files
          cd $GITHUB_WORKSPACE/repo
          repo-add prism-cracked.db.tar.gz *.pkg.tar.zst

          # repo-add hanya buat symlink .db → .db.tar.gz
          # GitHub Releases tidak upload symlink, jadi copy sebagai file biasa
          cp -L prism-cracked.db.tar.gz prism-cracked.db
          cp -L prism-cracked.files.tar.gz prism-cracked.files

          echo "Repo contents:"
          ls -lh

      # ── Commit updated PKGBUILD ─────────────────────────────────────────────
      - name: Commit PKGBUILD changes
        if: steps.check.outputs.should_build == 'true'
        run: |
          # Git menolak repo yang di-own UID berbeda (container security)
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          cd "$GITHUB_WORKSPACE"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add PKGBUILD
          git diff --staged --quiet || \
            git commit -m "chore: bump pkgver to ${{ steps.check.outputs.new_version }}"
          git push

      # ── Upload ke GitHub Release ────────────────────────────────────────────
      # Pakai tag fixed "repo" supaya Server URL di pacman.conf tidak pernah berubah
      - name: Update fixed "repo" release
        if: steps.check.outputs.should_build == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: repo
          name: Pacman Repo (latest)
          body: |
            ## Pacman Repo — PrismLauncher Cracked

            > **Versi saat ini:** `${{ steps.check.outputs.new_version }}`
            > Built from: [Diegiwg/PrismLauncher-Cracked@${{ steps.check.outputs.upstream_tag }}](https://github.com/Diegiwg/PrismLauncher-Cracked/releases/tag/${{ steps.check.outputs.upstream_tag }})

            ### Setup (sekali saja, tidak perlu diubah lagi saat update)

            Tambahkan ke `/etc/pacman.conf`:
            ```ini
            [prism-cracked]
            SigLevel = Optional TrustAll
            Server = https://github.com/${{ github.repository }}/releases/download/repo
            ```

            Lalu install:
            ```bash
            sudo pacman -Sy prismlauncher-cracked-bin
            ```
          files: |
            repo/*.pkg.tar.zst
            repo/prism-cracked.db.tar.gz
            repo/prism-cracked.db
            repo/prism-cracked.files.tar.gz
            repo/prism-cracked.files
          # overwrite file lama di release yang sama
          make_latest: true
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Release per-versi tetap dibuat sebagai arsip (opsional, bisa dihapus)
      - name: Create versioned release (archive)
        if: steps.check.outputs.should_build == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.check.outputs.new_version }}
          name: PrismLauncher Cracked ${{ steps.check.outputs.new_version }}
          body: |
            Built from upstream tag `${{ steps.check.outputs.upstream_tag }}`.
            Untuk instalasi, gunakan repo di tag `repo`.
          files: |
            repo/*.pkg.tar.zst
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}